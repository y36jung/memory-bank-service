description: 'Memory Bank RAG pipeline eval — use cases and edge cases'

prompts:
  - '{{query}}'

providers:
  - id: file://providers/memory-bank-provider.js
    label: memory-bank-chat

defaultTest:
  options:
    provider: memory-bank-chat

tests:
  - tests/retrieval_precision.yaml
  - tests/semantic_gap.yaml
  - tests/cross_domain_negative.yaml
  - tests/multi_source_conflict.yaml
  - tests/citation_correctness.yaml

# lifecycle.yaml is intentionally excluded — it needs delete/reingest
# orchestration between queries, which a single `eval` run can't express.
# Run it via `npm run eval:lifecycle` instead.

# Run: npm run setup && npm run eval
# View: npm run view
