# Citation correctness: sources returned must actually contain the claimed
# fact, not just be topically related. These asserts check structure/presence
# via context.metadata.sources; pair with a manual/LLM-graded spot check of
# whether the cited chunk's content field actually substantiates the answer.

- vars:
    query: 'What is slow-wave sleep responsible for?'
  assert:
    - type: javascript
      value: |
        const sources = context.metadata?.sources || [];
        return sources.length > 0 && sources.every(s => s.chunkId && s.documentId);
    - type: llm-rubric
      value: 'Mentions growth hormone release and/or glymphatic waste clearance as functions of deep/slow-wave sleep, matching what a cited source chunk would actually contain.'

- vars:
    query: "What's 2 + 2?"
  assert:
    - type: javascript
      value: |
        // A question needing no retrieval shouldn't force irrelevant sources into the response.
        const sources = context.metadata?.sources || [];
        return sources.length === 0;
    - type: contains
      value: '4'
